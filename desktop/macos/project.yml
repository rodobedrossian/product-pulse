name: ProductPulseRecorder
options:
  bundleIdPrefix: com.productpulse
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
targets:
  ProductPulseRecorder:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.productpulse.recorder
        PRODUCT_NAME: ProductPulseRecorder
        INFOPLIST_FILE: Info.plist
    entitlements:
      path: ProductPulseRecorder.entitlements
